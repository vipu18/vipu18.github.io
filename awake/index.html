<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prevent PC Sleep</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        transition: background-color 0.5s;
        background-color: #f4f4f4;
        color: #333;
      }

      h1 {
        margin-bottom: 10px;
      }

      p {
        margin-bottom: 30px;
        color: #666;
      }

      /* Toggle Switch Styling */
      .switch-btn {
        padding: 15px 30px;
        font-size: 20px;
        font-weight: bold;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition: all 0.3s ease;
      }

      /* Status: OFF */
      .status-off {
        background-color: #e74c3c;
        color: white;
      }

      /* Status: ON */
      .status-on {
        background-color: #2ecc71;
        color: white;
        box-shadow: 0 0 20px #2ecc71; /* Glowing effect */
      }

      .status-text {
        margin-top: 20px;
        font-weight: bold;
        font-size: 1.2rem;
      }
    </style>
  </head>
  <body>
    <h1>No-Sleep Mode</h1>
    <p>Keep this tab open and active to prevent sleep.</p>

    <button id="toggleBtn" class="switch-btn status-off">
      Enable Stay Awake
    </button>
    <div class="status-text" id="statusMsg">System can sleep naturally.</div>

    <video
      id="dummyVideo"
      loop
      muted
      playsinline
      width="1"
      height="1"
      style="opacity: 0"
    >
      <source
        src="data:video/mp4;base64,AAAAIGZ0eXGlc29tAAAAAGlzb21pc28yYXZjMW1wNDEAAAAIZnJlZQAAAAxpZGF0AAACAgAAAACQbW9vdgAAABlmdmN1AAAD8AAAAAAABAAAAAA=="
        type="video/mp4"
      />
    </video>

    <script>
      let wakeLock = null;
      const btn = document.getElementById("toggleBtn");
      const statusMsg = document.getElementById("statusMsg");
      const video = document.getElementById("dummyVideo");

      // Function to request the Wake Lock
      const requestWakeLock = async () => {
        try {
          // 1. Request the screen lock
          wakeLock = await navigator.wakeLock.request("screen");

          // 2. Update UI to Green
          btn.textContent = "DISABLE Stay Awake";
          btn.classList.remove("status-off");
          btn.classList.add("status-on");
          statusMsg.textContent = "System is forced to stay awake.";
          document.body.style.backgroundColor = "#e8f5e9"; // Light green bg

          // 3. Start dummy video (Backup for compatibility)
          video.play().catch(() => {});

          // 4. Listen for release (if user minimizes window, lock might break)
          wakeLock.addEventListener("release", () => {
            console.log("Wake Lock was released");
            resetUI();
          });
          console.log("Wake Lock is active");
        } catch (err) {
          console.error(`${err.name}, ${err.message}`);
          statusMsg.textContent = "Error: Browser not supported.";
        }
      };

      // Function to release the lock
      const releaseWakeLock = async () => {
        if (wakeLock !== null) {
          await wakeLock.release();
          wakeLock = null;
        }
        resetUI();
      };

      const resetUI = () => {
        btn.textContent = "ENABLE Stay Awake";
        btn.classList.remove("status-on");
        btn.classList.add("status-off");
        statusMsg.textContent = "System can sleep naturally.";
        document.body.style.backgroundColor = "#f4f4f4";
        video.pause();
      };

      // Handle Visibility Change (Re-acquire lock if user comes back to tab)
      document.addEventListener("visibilitychange", async () => {
        if (wakeLock !== null && document.visibilityState === "visible") {
          await requestWakeLock();
        }
      });

      // Button Click Logic
      btn.addEventListener("click", () => {
        if (wakeLock === null) {
          requestWakeLock();
        } else {
          releaseWakeLock();
        }
      });
    </script>
  </body>
</html>
